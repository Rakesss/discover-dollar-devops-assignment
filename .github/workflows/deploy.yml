name: Build and Push Docker Images

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend
        run: docker build -t player8598/dd-backend ./backend

      - name: Build frontend
        run: docker build -t player8598/dd-frontend ./frontend

      - name: Push backend
        run: docker push player8598/dd-backend

      - name: Push frontend
        run: docker push player8598/dd-frontend