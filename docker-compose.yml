version: "3"

services:

  mongodb:
    image: mongo:6
    container_name: mongodb
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/cruddb
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    ports:
      - "8081:80"